project:
  title: "How the Biopsychosocial Model Frames Chronic Pain Research"
  short_name: "HTBMFCPR"
  doi: "10.17605/OSF.IO/T4FAM"
  osf_registration_url: "https://osf.io/t4fam"
  osf_project_url: "https://osf.io/dwvru"
  start_date: "2025-11-11"
  end_date: "2026-07-01"
  funding: "Research Foundation Flanders (FWO), Project G075525N"

review:
  title: "How the Biopsychosocial Model Frames Chronic Pain Research"
  registration_doi: "10.17605/OSF.IO/T4FAM"
  type: "Systematic review with mixed-method synthesis (quantitative descriptive + qualitative framework synthesis), incorporating concept mapping."
  current_stage_registered: "Formal screening started; data extraction and synthesis not yet begun."
  primary_research_questions:
    - "How is the BPS model operationalized in reviews of chronic pain?"
    - "What is the scope, balance, and integration of biological, psychological, and social factors in musculoskeletal pain reviews?"
    - "Which psychological concepts and theoretical frameworks are used in chronic pain literature?"
  secondary_research_questions:
    - "What conceptual problems (e.g., vague definitions) are identified in reviews using the BPS model?"
  hypotheses:
    - "Many reviews will use the BPS model as a rhetorical or organizing device rather than as an integrative explanatory framework."
    - "True mechanistic integration of biological, psychological, and social factors will be rare."
    - "Psychological factors will dominate coverage, while biological and social domains will often be minimal or absent."
    - "Integration statements will typically lack mechanistic detail."
    - "Conceptual clarity issues will be common, especially for psychological concepts."

eligibility:
  inclusion:
    - "Adult population (>= 18 years)"
    - "Chronic pain (> 3 months)"
    - "Review article"
    - "Mentions biopsychosocial or spelling variants in title or abstract"
    - "English language"
    - "Publication date between 1977-01-01 and 2026-03-31"
  exclusion:
    - "Primary study"
    - "Protocol"
    - "Commentary, editorial, letter, or conference abstract"
    - "Book or book chapter"
    - "Pediatric-only population"
    - "Acute pain only"
    - "Animal study"
    - "Grey literature"

